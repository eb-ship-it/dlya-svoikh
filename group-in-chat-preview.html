<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Группа в списке чатов</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 30px 16px; display: flex; justify-content: center; }
    .phone { width: 360px; border-radius: 30px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.12); background: white; border: 6px solid #1a1a1a; }
    .notch { height: 20px; background: #1a1a1a; border-radius: 0 0 14px 14px; width: 120px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: white; border-bottom: 1px solid #f0f0f0; }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .tab-bar { display: flex; border-top: 1px solid #f0f0f0; background: white; }
    .tab { flex: 1; text-align: center; padding: 8px 0 6px; font-size: 10px; font-weight: 500; color: #9ca3af; }
    .tab.active { color: #8b5cf6; }
    .chat-header { padding: 14px 16px; font-weight: 600; font-size: 16px; color: #1f2937; background: white; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
    .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: white; }
    .chat-item:not(:last-child) { border-bottom: 1px solid #f8f8f8; }
    .chat-meta { flex: 1; min-width: 0; }
    .chat-name { font-size: 14px; font-weight: 500; color: #1f2937; }
    .chat-name.bold { font-weight: 700; color: #111827; }
    .chat-preview { font-size: 12px; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-preview.bold { color: #374151; font-weight: 500; }
    .badge { background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; font-size: 10px; font-weight: 700; min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 0 5px; flex-shrink: 0; }
    .group-btn { display: flex; align-items: center; gap: 4px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; font-size: 11px; font-weight: 500; padding: 5px 10px; border-radius: 20px; border: none; }
  </style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="header">
    <div class="header-left">
      <svg viewBox="0 0 100 100" width="28" height="28" style="border-radius:6px;">
        <defs><linearGradient id="ic" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#8b5cf6"/><stop offset="100%" style="stop-color:#ec4899"/></linearGradient></defs>
        <rect width="100" height="100" rx="20" fill="url(#ic)"/>
        <text x="44" y="70" text-anchor="middle" font-family="-apple-system" font-size="58" font-weight="700" fill="white">С</text>
      </svg>
      <span style="font-weight:600; font-size:15px; color:#1f2937">Свои</span>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <span style="font-size:13px; color:#9ca3af">Елена</span>
      <canvas id="my-avatar" style="width:32px; height:32px; border-radius:50%;"></canvas>
    </div>
  </div>

  <div class="chat-header">
    Чаты
    <button class="group-btn">
      <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
      Группа
    </button>
  </div>

  <div>
    <!-- Group chat with blob avatar -->
    <div class="chat-item">
      <canvas id="group1" style="width:44px; height:44px;"></canvas>
      <div class="chat-meta">
        <div class="chat-name bold">Семья</div>
        <div class="chat-preview bold">Мама: Кто придёт в воскресенье?</div>
      </div>
      <span class="badge">3</span>
    </div>

    <!-- Personal chat with face avatar -->
    <div class="chat-item">
      <canvas id="face1" style="width:44px; height:44px; border-radius:50%;"></canvas>
      <div class="chat-meta">
        <div class="chat-name">Лёша Неводов</div>
        <div class="chat-preview">Окей, договорились!</div>
      </div>
    </div>

    <!-- Group chat with blob avatar -->
    <div class="chat-item">
      <canvas id="group2" style="width:44px; height:44px;"></canvas>
      <div class="chat-meta">
        <div class="chat-name bold">Работа</div>
        <div class="chat-preview bold">Антон: Завтра созвон в 10</div>
      </div>
      <span class="badge">1</span>
    </div>

    <!-- Personal chat -->
    <div class="chat-item">
      <canvas id="face2" style="width:44px; height:44px; border-radius:50%;"></canvas>
      <div class="chat-meta">
        <div class="chat-name">Анна Смирнова</div>
        <div class="chat-preview">Фото отправила!</div>
      </div>
    </div>

    <!-- Group chat -->
    <div class="chat-item">
      <canvas id="group3" style="width:44px; height:44px;"></canvas>
      <div class="chat-meta">
        <div class="chat-name">Поход</div>
        <div class="chat-preview">Нет сообщений</div>
      </div>
    </div>

    <!-- Personal -->
    <div class="chat-item">
      <canvas id="face3" style="width:44px; height:44px; border-radius:50%;"></canvas>
      <div class="chat-meta">
        <div class="chat-name">Марина К.</div>
        <div class="chat-preview">Спасибо большое! 💜</div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab active">💬 Чаты</div>
    <div class="tab">📰 Лента</div>
    <div class="tab">👥 Друзья</div>
  </div>
</div>

<script>
const grad = ['#8b5cf6', '#ec4899']

function hash(str) {
  let h = 0
  for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h)
  return Math.abs(h)
}

// Draw blob group avatar
function drawBlob(canvasId, letter, seed) {
  const c = document.getElementById(canvasId)
  const s = 88
  c.width = s; c.height = s
  const ctx = c.getContext('2d')
  const cx = s/2, cy = s/2, r = s * 0.42

  // Blob shape
  ctx.beginPath()
  const points = 8
  const h = hash(seed || letter)
  const firstR = r * (0.92 + ((h >> 0) & 7) / 70)
  ctx.moveTo(cx + firstR, cy)

  for (let j = 0; j < points; j++) {
    const a1 = (j / points) * Math.PI * 2
    const a2 = ((j + 1) / points) * Math.PI * 2
    const amid = (a1 + a2) / 2
    const r1 = r * (0.92 + ((h >> j) & 7) / 70)
    const r2 = r * (0.92 + ((h >> ((j+1)%8)) & 7) / 70)
    const rmid = r * (0.96 + ((h >> (j+4)) & 7) / 80) * 1.08

    ctx.quadraticCurveTo(
      cx + Math.cos(amid) * rmid,
      cy + Math.sin(amid) * rmid,
      cx + Math.cos(a2) * r2,
      cy + Math.sin(a2) * r2
    )
  }
  ctx.closePath()

  const g = ctx.createLinearGradient(0, 0, s, s)
  g.addColorStop(0, grad[0]); g.addColorStop(1, grad[1])
  ctx.fillStyle = g; ctx.fill()

  // Letter
  ctx.fillStyle = 'white'
  ctx.font = '700 34px -apple-system, sans-serif'
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
  ctx.fillText(letter, cx, cy + 2)
}

// Draw face avatar
function drawFace(canvasId, username) {
  const c = document.getElementById(canvasId)
  const s = 88
  c.width = s; c.height = s
  const ctx = c.getContext('2d')
  const h = hash(username)

  const g = ctx.createLinearGradient(0, 0, s, s)
  const pals = [
    ['#8b5cf6','#ec4899'], ['#6366f1','#8b5cf6'], ['#ec4899','#f43f5e'],
    ['#a855f7','#6366f1'], ['#f472b6','#a855f7']
  ]
  const pal = pals[h % pals.length]
  g.addColorStop(0, pal[0]); g.addColorStop(1, pal[1])
  ctx.beginPath(); ctx.arc(s/2, s/2, s/2, 0, Math.PI*2)
  ctx.fillStyle = g; ctx.fill()

  const cx = s/2, faceY = s * 0.44
  const eyeSpread = s * 0.13
  const eyeY = faceY - s * 0.02

  ctx.fillStyle = 'white'
  const eyeStyle = h % 3
  if (eyeStyle === 0) {
    ctx.beginPath(); ctx.arc(cx - eyeSpread, eyeY, 3.5, 0, Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(cx + eyeSpread, eyeY, 3.5, 0, Math.PI*2); ctx.fill()
  } else if (eyeStyle === 1) {
    ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.lineCap = 'round'
    ctx.beginPath(); ctx.arc(cx - eyeSpread, eyeY, 3, Math.PI, 2*Math.PI); ctx.stroke()
    ctx.beginPath(); ctx.arc(cx + eyeSpread, eyeY, 3, Math.PI, 2*Math.PI); ctx.stroke()
  } else {
    ctx.beginPath(); ctx.arc(cx - eyeSpread, eyeY, 2, 0, Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(cx + eyeSpread, eyeY, 2, 0, Math.PI*2); ctx.fill()
  }

  ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.lineCap = 'round'
  const mouthY = faceY + s * 0.13
  if (h % 2 === 0) {
    ctx.beginPath(); ctx.arc(cx, mouthY - 3, 7, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke()
  } else {
    ctx.beginPath(); ctx.moveTo(cx - 5, mouthY); ctx.lineTo(cx + 5, mouthY); ctx.stroke()
  }

  if (h % 3 !== 2) {
    ctx.fillStyle = 'rgba(255,255,255,0.13)'
    ctx.beginPath(); ctx.arc(cx - eyeSpread - 3, faceY + 5, 4, 0, Math.PI*2); ctx.fill()
    ctx.beginPath(); ctx.arc(cx + eyeSpread + 3, faceY + 5, 4, 0, Math.PI*2); ctx.fill()
  }
}

// Draw all
drawBlob('group1', 'С', 'family')
drawBlob('group2', 'Р', 'work')
drawBlob('group3', 'П', 'hiking')
drawFace('face1', 'lesha_nevodov')
drawFace('face2', 'anna')
drawFace('face3', 'marina_k')

// My avatar in header
const ma = document.getElementById('my-avatar')
ma.width = 64; ma.height = 64
const mctx = ma.getContext('2d')
const mg = mctx.createLinearGradient(0, 0, 64, 64)
mg.addColorStop(0, '#a855f7'); mg.addColorStop(1, '#ec4899')
mctx.beginPath(); mctx.arc(32, 32, 32, 0, Math.PI*2); mctx.fillStyle = mg; mctx.fill()
mctx.fillStyle = 'white'
mctx.beginPath(); mctx.arc(24, 27, 3, 0, Math.PI*2); mctx.fill()
mctx.beginPath(); mctx.arc(40, 27, 3, 0, Math.PI*2); mctx.fill()
mctx.strokeStyle = 'white'; mctx.lineWidth = 2; mctx.lineCap = 'round'
mctx.beginPath(); mctx.arc(32, 36, 7, 0.15*Math.PI, 0.85*Math.PI); mctx.stroke()
</script>
</body>
</html>
