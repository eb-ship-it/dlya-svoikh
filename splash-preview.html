<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splash Screen — варианты</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; padding: 30px 16px; }
    h1 { text-align: center; color: white; margin-bottom: 10px; font-size: 22px; }
    .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 40px; }
    .grid { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
    .phone-wrap { text-align: center; }
    .phone-label { font-size: 13px; color: #aaa; margin-bottom: 8px; }
    .phone { width: 280px; height: 520px; border-radius: 30px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.3); border: 5px solid #333; position: relative; }

    /* A: Пульсирующий логотип */
    .splash-a {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%;
    }
    .splash-a .logo { animation: pulse-a 2s ease-in-out infinite; }
    .splash-a .text { color: white; font-size: 28px; font-weight: 700; margin-top: 16px; }
    .splash-a .sub { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 4px; }
    .splash-a .dots { display: flex; gap: 6px; margin-top: 40px; }
    .splash-a .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.4); border-radius: 50%; animation: dot-bounce 1.4s ease-in-out infinite; }
    .splash-a .dot:nth-child(2) { animation-delay: 0.2s; }
    .splash-a .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse-a {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes dot-bounce {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }

    /* B: Частицы */
    .splash-b {
      background: #0f0a1e;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; position: relative; overflow: hidden;
    }
    .splash-b canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .splash-b .content { position: relative; z-index: 1; text-align: center; }
    .splash-b .text { color: white; font-size: 28px; font-weight: 700; margin-top: 16px; }
    .splash-b .sub { color: rgba(255,255,255,0.4); font-size: 13px; margin-top: 4px; }

    /* C: Gradient morph */
    .splash-c {
      background: #1a1028;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; position: relative; overflow: hidden;
    }
    .splash-c .blob1, .splash-c .blob2, .splash-c .blob3 {
      position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.6;
    }
    .splash-c .blob1 { width: 200px; height: 200px; background: #8b5cf6; top: 10%; left: -20%; animation: float-1 6s ease-in-out infinite; }
    .splash-c .blob2 { width: 250px; height: 250px; background: #ec4899; bottom: 10%; right: -30%; animation: float-2 8s ease-in-out infinite; }
    .splash-c .blob3 { width: 150px; height: 150px; background: #6366f1; top: 50%; left: 40%; animation: float-3 7s ease-in-out infinite; }
    .splash-c .content { position: relative; z-index: 1; text-align: center; }
    .splash-c .text { color: white; font-size: 28px; font-weight: 700; margin-top: 16px; }
    .splash-c .sub { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 4px; }
    .splash-c .loader { width: 40px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 40px auto 0; overflow: hidden; }
    .splash-c .loader-bar { width: 40%; height: 100%; background: linear-gradient(90deg, #8b5cf6, #ec4899); border-radius: 2px; animation: loader-slide 1.5s ease-in-out infinite; }

    @keyframes float-1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(40px, 30px); } }
    @keyframes float-2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-30px, -40px); } }
    @keyframes float-3 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-20px, 20px); } }
    @keyframes loader-slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

    /* D: Минимализм + spin */
    .splash-d {
      background: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%;
    }
    .splash-d .logo-ring {
      width: 90px; height: 90px; position: relative;
    }
    .splash-d .logo-ring .ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 3px solid transparent; border-top-color: #8b5cf6; border-right-color: #ec4899;
      animation: spin-d 1.5s linear infinite;
    }
    .splash-d .logo-ring .inner {
      position: absolute; inset: 8px; border-radius: 16px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      display: flex; align-items: center; justify-content: center;
    }
    .splash-d .text { color: #1f2937; font-size: 24px; font-weight: 700; margin-top: 20px; }
    .splash-d .sub { color: #9ca3af; font-size: 12px; margin-top: 4px; }

    @keyframes spin-d { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* E: Gradient wave */
    .splash-e {
      background: linear-gradient(180deg, #8b5cf6 0%, #7c3aed 30%, #ec4899 70%, #f472b6 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; position: relative; overflow: hidden;
    }
    .splash-e .wave {
      position: absolute; bottom: 0; left: -50%; width: 200%; height: 120px;
      background: rgba(255,255,255,0.08); border-radius: 50% 50% 0 0;
    }
    .splash-e .wave1 { animation: wave-move 4s ease-in-out infinite; }
    .splash-e .wave2 { height: 80px; bottom: 20px; animation: wave-move 5s ease-in-out infinite reverse; background: rgba(255,255,255,0.05); }
    .splash-e .content { position: relative; z-index: 1; text-align: center; }
    .splash-e .text { color: white; font-size: 32px; font-weight: 800; margin-top: 16px; letter-spacing: 2px; }
    .splash-e .sub { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 6px; font-weight: 300; }
    .splash-e .heart { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 60px; }

    @keyframes wave-move { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(25%); } }

    /* F: Typewriter */
    .splash-f {
      background: linear-gradient(135deg, #1a1028, #2d1b4e);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%;
    }
    .splash-f .text {
      color: white; font-size: 32px; font-weight: 700;
      overflow: hidden; white-space: nowrap; border-right: 2px solid #ec4899;
      animation: typewriter 2s steps(4) 0.5s forwards, blink 0.8s step-end infinite;
      width: 0; max-width: 4.5ch;
    }
    .splash-f .sub { color: rgba(255,255,255,0.3); font-size: 13px; margin-top: 12px; opacity: 0; animation: fadein 1s 2.5s forwards; }
    .splash-f .glow {
      width: 200px; height: 200px; position: absolute;
      background: radial-gradient(circle, rgba(139,92,246,0.3), transparent 70%);
      animation: glow-pulse 3s ease-in-out infinite;
    }

    @keyframes typewriter { 0% { width: 0; } 100% { width: 4.5ch; } }
    @keyframes blink { 0%, 100% { border-color: #ec4899; } 50% { border-color: transparent; } }
    @keyframes fadein { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes glow-pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 0.8; } }
  </style>
</head>
<body>

<h1>Splash Screen</h1>
<p class="subtitle">Экран загрузки — варианты</p>

<div class="grid">

  <!-- A -->
  <div class="phone-wrap">
    <div class="phone-label">A — Пульс</div>
    <div class="phone">
      <div class="splash-a">
        <svg class="logo" viewBox="0 0 100 100" width="72" height="72" style="filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));">
          <rect width="100" height="100" rx="22" fill="rgba(255,255,255,0.2)"/>
          <text x="44" y="70" text-anchor="middle" font-family="-apple-system" font-size="58" font-weight="700" fill="white">С</text>
          <path d="M72 30 C68 25, 62 22, 62 17 C62 13, 65 11, 68 11 C70 11, 72 13, 73 15 C74 13, 76 11, 78 11 C81 11, 84 13, 84 17 C84 22, 78 25, 73 30Z" fill="white" opacity="0.8"/>
        </svg>
        <div class="text">Свои</div>
        <div class="sub">Мессенджер для своих</div>
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
    </div>
  </div>

  <!-- B -->
  <div class="phone-wrap">
    <div class="phone-label">B — Частицы</div>
    <div class="phone">
      <div class="splash-b">
        <canvas id="particles"></canvas>
        <div class="content">
          <svg viewBox="0 0 100 100" width="72" height="72" style="filter: drop-shadow(0 0 30px rgba(139,92,246,0.5));">
            <defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#8b5cf6"/><stop offset="100%" style="stop-color:#ec4899"/></linearGradient></defs>
            <rect width="100" height="100" rx="22" fill="url(#sg)"/>
            <text x="44" y="70" text-anchor="middle" font-family="-apple-system" font-size="58" font-weight="700" fill="white">С</text>
            <path d="M72 30 C68 25, 62 22, 62 17 C62 13, 65 11, 68 11 C70 11, 72 13, 73 15 C74 13, 76 11, 78 11 C81 11, 84 13, 84 17 C84 22, 78 25, 73 30Z" fill="white" opacity="0.8"/>
          </svg>
          <div class="text">Свои</div>
          <div class="sub">Мессенджер для своих</div>
        </div>
      </div>
    </div>
  </div>

  <!-- C -->
  <div class="phone-wrap">
    <div class="phone-label">C — Блобы</div>
    <div class="phone">
      <div class="splash-c">
        <div class="blob1"></div>
        <div class="blob2"></div>
        <div class="blob3"></div>
        <div class="content">
          <svg viewBox="0 0 100 100" width="72" height="72" style="filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));">
            <rect width="100" height="100" rx="22" fill="rgba(255,255,255,0.15)"/>
            <text x="44" y="70" text-anchor="middle" font-family="-apple-system" font-size="58" font-weight="700" fill="white">С</text>
            <path d="M72 30 C68 25, 62 22, 62 17 C62 13, 65 11, 68 11 C70 11, 72 13, 73 15 C74 13, 76 11, 78 11 C81 11, 84 13, 84 17 C84 22, 78 25, 73 30Z" fill="white" opacity="0.8"/>
          </svg>
          <div class="text">Свои</div>
          <div class="sub">Мессенджер для своих</div>
          <div class="loader"><div class="loader-bar"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- D -->
  <div class="phone-wrap">
    <div class="phone-label">D — Спиннер</div>
    <div class="phone">
      <div class="splash-d">
        <div class="logo-ring">
          <div class="ring"></div>
          <div class="inner">
            <svg viewBox="0 0 100 100" width="50" height="50">
              <text x="44" y="70" text-anchor="middle" font-family="-apple-system" font-size="58" font-weight="700" fill="white">С</text>
              <path d="M72 30 C68 25, 62 22, 62 17 C62 13, 65 11, 68 11 C70 11, 72 13, 73 15 C74 13, 76 11, 78 11 C81 11, 84 13, 84 17 C84 22, 78 25, 73 30Z" fill="white" opacity="0.8"/>
            </svg>
          </div>
        </div>
        <div class="text">Свои</div>
        <div class="sub">Мессенджер для своих</div>
      </div>
    </div>
  </div>

  <!-- E -->
  <div class="phone-wrap">
    <div class="phone-label">E — Волны</div>
    <div class="phone">
      <div class="splash-e">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="content">
          <svg viewBox="0 0 100 100" width="72" height="72" style="filter: drop-shadow(0 4px 20px rgba(0,0,0,0.2));">
            <rect width="100" height="100" rx="22" fill="rgba(255,255,255,0.2)"/>
            <text x="44" y="70" text-anchor="middle" font-family="-apple-system" font-size="58" font-weight="700" fill="white">С</text>
            <path d="M72 30 C68 25, 62 22, 62 17 C62 13, 65 11, 68 11 C70 11, 72 13, 73 15 C74 13, 76 11, 78 11 C81 11, 84 13, 84 17 C84 22, 78 25, 73 30Z" fill="white" opacity="0.8"/>
          </svg>
          <div class="text">СВОИ</div>
          <div class="sub">Мессенджер для своих</div>
          <div class="heart">сделано с ❤️</div>
        </div>
      </div>
    </div>
  </div>

  <!-- F -->
  <div class="phone-wrap">
    <div class="phone-label">F — Печатная машинка</div>
    <div class="phone">
      <div class="splash-f" style="position:relative;">
        <div class="glow"></div>
        <svg viewBox="0 0 100 100" width="72" height="72" style="position:relative; z-index:1; filter: drop-shadow(0 0 30px rgba(236,72,153,0.4));">
          <defs><linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#8b5cf6"/><stop offset="100%" style="stop-color:#ec4899"/></linearGradient></defs>
          <rect width="100" height="100" rx="22" fill="url(#sg2)"/>
          <text x="44" y="70" text-anchor="middle" font-family="-apple-system" font-size="58" font-weight="700" fill="white">С</text>
          <path d="M72 30 C68 25, 62 22, 62 17 C62 13, 65 11, 68 11 C70 11, 72 13, 73 15 C74 13, 76 11, 78 11 C81 11, 84 13, 84 17 C84 22, 78 25, 73 30Z" fill="white" opacity="0.8"/>
        </svg>
        <div class="text" style="position:relative; z-index:1;">Свои</div>
        <div class="sub" style="position:relative; z-index:1;">Мессенджер для своих</div>
      </div>
    </div>
  </div>

</div>

<script>
// Particles for variant B
const canvas = document.getElementById('particles')
if (canvas) {
  const ctx = canvas.getContext('2d')
  canvas.width = 280 * 2; canvas.height = 520 * 2
  const particles = []
  for (let i = 0; i < 40; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 3 + 1,
      dx: (Math.random() - 0.5) * 0.8,
      dy: (Math.random() - 0.5) * 0.8,
      color: Math.random() > 0.5 ? 'rgba(139,92,246,' : 'rgba(236,72,153,',
      alpha: Math.random() * 0.5 + 0.2,
    })
  }
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height)
    particles.forEach(p => {
      p.x += p.dx; p.y += p.dy
      if (p.x < 0 || p.x > canvas.width) p.dx *= -1
      if (p.y < 0 || p.y > canvas.height) p.dy *= -1
      ctx.beginPath()
      ctx.arc(p.x, p.y, p.r * 2, 0, Math.PI * 2)
      ctx.fillStyle = p.color + p.alpha + ')'
      ctx.fill()
    })
    // Draw lines between close particles
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x
        const dy = particles[i].y - particles[j].y
        const dist = Math.sqrt(dx*dx + dy*dy)
        if (dist < 150) {
          ctx.beginPath()
          ctx.moveTo(particles[i].x, particles[i].y)
          ctx.lineTo(particles[j].x, particles[j].y)
          ctx.strokeStyle = 'rgba(139,92,246,' + (0.15 * (1 - dist/150)) + ')'
          ctx.lineWidth = 1
          ctx.stroke()
        }
      }
    }
    requestAnimationFrame(animate)
  }
  animate()
}
</script>
</body>
</html>
